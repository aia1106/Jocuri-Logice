<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Ninja - Division Quest</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --success: #00ff88;
            --error: #ff4b2b;
            --dark-bg: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Fundal animat */
        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.3;
            z-index: -1;
            transition: background 0.5s ease;
        }

        #game-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-bottom: 3px solid var(--neon-blue);
        }

        .high-score-tag {
            grid-column: span 2;
            color: #ffd700;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .question-container {
            margin: 30px 0;
        }

        .level-indicator {
            color: var(--neon-blue);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            font-size: 2rem;
            color: white;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-option:hover {
            background: var(--neon-blue);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.4);
        }

        /* Efecte de feedback */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        .wrong { animation: shake 0.4s; border-color: var(--error) !important; }
        .correct { border-color: var(--success) !important; }

        #level-banner {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--neon-blue);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: none;
            box-shadow: 0 0 15px var(--neon-blue);
        }
    </style>
</head>
<body>

<div class="bg-glow" id="glow"></div>

<div id="game-card">
    <div id="level-banner">NIVEL NOU! 🚀</div>
    
    <div class="header-stats">
        <div class="stat-box">SCOR: <span id="score">0</span></div>
        <div class="stat-box">VIEȚI: <span id="lives">3</span></div>
        <div class="high-score-tag">RECORD PERSONAL: <span id="high-score">0</span></div>
    </div>

    <div class="question-container">
        <div class="level-indicator" id="lvl-txt">Nivel 1</div>
        <h1 class="question-text" id="q-text">12 ÷ 3</h1>
    </div>

    <div class="grid-options" id="options-grid">
        </div>
</div>

<script>
    let score = 0;
    let lives = 3;
    let level = 1;
    let correctAnswer = 0;
    let highScore = localStorage.getItem('mathHighScore') || 0;

    const glow = document.getElementById('glow');
    const card = document.getElementById('game-card');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const highEl = document.getElementById('high-score');
    const qText = document.getElementById('q-text');
    const lvlText = document.getElementById('lvl-txt');
    const grid = document.getElementById('options-grid');
    const banner = document.getElementById('level-banner');

    highEl.innerText = highScore;

    function nextQuestion() {
        // Logica dificultate: rezultatul crește cu nivelul
        let minRes = 2 + (level - 1);
        let maxRes = 10 + (level * 2);
        
        let result = Math.floor(Math.random() * (maxRes - minRes + 1)) + minRes;
        let divisor = Math.floor(Math.random() * (9)) + 2;
        let dividend = result * divisor;

        correctAnswer = result;
        qText.innerText = `${dividend} ÷ ${divisor}`;
        lvlText.innerText = `Nivel ${level}`;

        // Generare opțiuni
        let choices = [result];
        while(choices.length < 4) {
            let offset = Math.floor(Math.random() * 10) - 5;
            let wrong = result + (offset === 0 ? 3 : offset);
            if(wrong > 0 && !choices.includes(wrong)) choices.push(wrong);
        }
        choices.sort(() => Math.random() - 0.5);

        grid.innerHTML = '';
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = val;
            btn.onclick = () => check(val);
            grid.appendChild(btn);
        });
    }

    function check(val) {
        if(val === correctAnswer) {
            score += 10;
            scoreEl.innerText = score;
            
            // Verificare Level Up
            if(score % 50 === 0) {
                level++;
                triggerLevelBanner();
            }

            // Record nou?
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('mathHighScore', highScore);
                highEl.innerText = highScore;
            }

            visualFeedback('success');
        } else {
            lives--;
            livesEl.innerText = lives;
            visualFeedback('error');
            
            if(lives <= 0) {
                setTimeout(() => {
                    alert(`Jocul s-a terminat! Ai ajuns la nivelul ${level}.\nScor final: ${score}`);
                    reset();
                }, 100);
            }
        }
    }

    function visualFeedback(type) {
        if(type === 'success') {
            glow.style.background = `radial-gradient(circle, var(--success) 0%, transparent 70%)`;
            card.classList.add('correct');
            setTimeout(() => {
                card.classList.remove('correct');
                resetGlow();
                nextQuestion();
            }, 400);
        } else {
            glow.style.background = `radial-gradient(circle, var(--error) 0%, transparent 70%)`;
            card.classList.add('wrong');
            setTimeout(() => {
                card.classList.remove('wrong');
                resetGlow();
                nextQuestion();
            }, 500);
        }
    }

    function resetGlow() {
        glow.style.background = `radial-gradient(circle, var(--neon-purple) 0%, transparent 70%)`;
    }

    function triggerLevelBanner() {
        banner.style.display = 'block';
        setTimeout(() => banner.style.display = 'none', 1500);
    }

    function reset() {
        score = 0;
        lives = 3;
        level = 1;
        scoreEl.innerText = "0";
        livesEl.innerText = "3";
        nextQuestion();
    }

    // Pornim prima întrebare
    nextQuestion();
</script>

</body>
</html>
