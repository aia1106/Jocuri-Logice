<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grădina cu Adunări - Clasa I</title>
    <style>
        :root {
            --green-bg: #e8f5e9;
            --card-back: #ff9f43;
            --card-front: #ffffff;
            --text-color: #2d3436;
            --match-color: #2ecc71;
        }

        body {
            background-color: var(--green-bg);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 { color: #2c3e50; font-size: 2.2rem; margin-bottom: 5px; text-align: center; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 400px;
            perspective: 1000px; /* Adăugat pentru efect 3D corect */
        }

        .card {
            width: 100px;
            height: 100px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        /* Această clasă întoarce cardul */
        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Ascunde spatele când se rotește */
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 5px solid white;
            font-size: 1.8rem;
            font-weight: bold;
            box-sizing: border-box;
        }

        .card-back {
            background-color: var(--card-back);
            box-shadow: 0 6px 0 #e67e22;
        }

        .card-front {
            background-color: var(--card-front);
            color: var(--text-color);
            transform: rotateY(180deg); /* Textul este deja rotit pe "față" */
            box-shadow: 0 6px 0 #bdc3c7;
        }

        .card.matched .card-front {
            background-color: var(--match-color);
            color: white;
            border-color: #27ae60;
            box-shadow: none;
        }

        #win-msg {
            display: none;
            position: fixed;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 10;
        }

        button {
            background: #2ecc71; color: white; border: none;
            padding: 15px 30px; font-size: 1.3rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 0 #27ae60;
        }
    </style>
</head>
<body>

    <h1>🍎 Grădina Numerelor 🍎</h1>
    <p style="color: #666;">Găsește perechile corecte!</p>

    <div class="grid" id="game-grid"></div>

    <div id="win-msg">
        <h2>BRAVO! ✨</h2>
        <p>Ai rezolvat toate adunările!</p>
        <button onclick="initGame()">Joacă iar! 🔄</button>
    </div>

<script>
    const gridElement = document.getElementById('game-grid');
    const winMsg = document.getElementById('win-msg');
    
    const pairs = [
        { text: '1 + 1', val: 2 }, { text: '2', val: 2 },
        { text: '2 + 2', val: 4 }, { text: '4', val: 4 },
        { text: '5 + 0', val: 5 }, { text: '5', val: 5 },
        { text: '3 + 3', val: 6 }, { text: '6', val: 6 },
        { text: '4 + 3', val: 7 }, { text: '7', val: 7 },
        { text: '5 + 4', val: 9 }, { text: '9', val: 9 }
    ];

    let flippedCards = [];
    let matchedCount = 0;

    function initGame() {
        gridElement.innerHTML = '';
        winMsg.style.display = 'none';
        matchedCount = 0;
        flippedCards = [];

        const gameData = [...pairs].sort(() => Math.random() - 0.5);

        gameData.forEach((item) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.val = item.val;
            
            card.innerHTML = `
                <div class="card-face card-back">?</div>
                <div class="card-face card-front">${item.text}</div>
            `;
            
            card.onclick = () => flipCard(card);
            gridElement.appendChild(card);
        });
    }

    function flipCard(card) {
        if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }
    }

    function checkMatch() {
        const [c1, c2] = flippedCards;
        if (c1.dataset.val === c2.dataset.val) {
            setTimeout(() => {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedCount += 2;
                flippedCards = [];
                if (matchedCount === pairs.length) winMsg.style.display = 'block';
            }, 500);
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
            }, 1000);
        }
    }

    initGame();
</script>
</body>
</html>
