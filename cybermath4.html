<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Math Alchemist - Crystal Lab Pro</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --purple: #7d2ae8;
            --pink: #ff00c8;
            --gold: #ffcc00;
            --bg: #050510;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            background: radial-gradient(circle at center, #101035 0%, #050510 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
        }

        #game-container {
            position: relative;
            width: 95%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .score-val { color: var(--gold); font-weight: bold; font-size: 1.1rem; }
        .high-val { color: var(--cyan); opacity: 0.8; }

        .target-hud { margin-bottom: 25px; }
        .target-label { font-size: 0.7rem; letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; }

        .target-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border: 3px solid var(--cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: 900;
            text-shadow: 0 0 20px var(--cyan);
            background: rgba(0, 242, 255, 0.05);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--cyan); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px var(--purple); border-color: var(--purple); }
        }

        .display-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-height: 80px;
        }

        #formula-text { font-size: 1.1rem; color: #aaa; min-height: 1.4rem; margin-bottom: 5px; letter-spacing: 1px; }
        #live-result { font-size: 2.4rem; font-weight: bold; color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }

        .btn-crystal {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            height: 60px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-crystal:hover:not(:disabled) { background: var(--cyan); color: #000; }
        .btn-crystal:disabled { opacity: 0.2; cursor: not-allowed; }

        .btn-op {
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: white;
            height: 50px;
            border-radius: 12px;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
        }

        .btn-paren {
            background: rgba(255, 255, 255, 0.15);
            color: var(--cyan);
            font-weight: bold;
        }

        .btn-reset {
            grid-column: span 4;
            background: none;
            border: 1px solid rgba(255, 75, 43, 0.3);
            color: #ff4b2b;
            padding: 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
        }

        #success-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.95);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div id="game-container">
    <div id="success-overlay">
        <div style="font-size: 60px; margin-bottom: 10px;">✨</div>
        <h2 style="color: var(--cyan); margin: 0;">Fuziune Reușită!</h2>
        <p style="color: var(--gold);">+20 PUNCTE ALCHIMICE</p>
    </div>

    <div class="score-row">
        <div>SCOR: <span id="score" class="score-val">0</span></div>
        <div>RECORD: <span id="high-score" class="high-val">0</span></div>
    </div>

    <div class="target-hud">
        <div class="target-label">Ținta de Fuziune</div>
        <div class="target-circle" id="target-val">--</div>
    </div>

    <div class="display-panel">
        <div id="formula-text">---</div>
        <div id="live-result">0</div>
    </div>

    <div class="grid" id="num-grid"></div>

    <div class="grid">
        <button class="btn-op" onclick="addPart('+')">+</button>
        <button class="btn-op" onclick="addPart('-')">−</button>
        <button class="btn-op" onclick="addPart('*')">×</button>
        <button class="btn-op" onclick="addPart('/')">÷</button>
    </div>

    <div class="grid">
        <button class="btn-op btn-paren" onclick="addPart('(')">(</button>
        <button class="btn-op btn-paren" onclick="addPart(')')">)</button>
        <button class="btn-reset" onclick="resetCurrent()">Resetează Formula</button>
    </div>
</div>

<script>
    let score = 0;
    let highScore = localStorage.getItem('crystalHS') || 0;
    let target = 0;
    let formula = [];
    let numbers = [];

    document.getElementById('high-score').innerText = highScore;

    function initGame() {
        formula = [];
        // Generăm numere pentru nivelul 2
        let n1 = Math.floor(Math.random() * 10) + 2;
        let n2 = Math.floor(Math.random() * 5) + 2;
        let n3 = Math.floor(Math.random() * 8) + 1;
        
        numbers = [n1, n2, n3, Math.floor(Math.random() * 9) + 1];
        numbers.sort(() => Math.random() - 0.5);

        // Stabilim o țintă rezonabilă
        target = (n1 + n2) * n3; 
        if(target > 150 || target < 5) target = Math.floor(Math.random() * 40) + 10;

        document.getElementById('target-val').innerText = target;
        renderNumbers();
        updateUI();
    }

    function renderNumbers() {
        const grid = document.getElementById('num-grid');
        grid.innerHTML = '';
        numbers.forEach((n, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-crystal';
            btn.innerText = n;
            btn.id = `btn-${i}`;
            btn.onclick = () => {
                // Nu poți pune număr după număr sau după paranteză închisă
                let last = formula[formula.length-1];
                if(typeof last === 'number' || last === ')') return;
                
                formula.push(n);
                btn.disabled = true;
                updateUI();
                checkResult();
            };
            grid.appendChild(btn);
        });
    }

    function addPart(p) {
        let last = formula[formula.length-1];

        // Validare de bază pentru paranteze și operatori
        if(p === '(') {
            if(typeof last === 'number' || last === ')') return;
        }
        if(p === ')') {
            let openCount = formula.filter(x => x === '(').length;
            let closeCount = formula.filter(x => x === ')').length;
            if(typeof last !== 'number' && last !== ')' || openCount <= closeCount) return;
        }
        if(['+','-','*','/'].includes(p)) {
            if(formula.length === 0 || (typeof last !== 'number' && last !== ')')) return;
        }

        formula.push(p);
        updateUI();
    }

    function updateUI() {
        const fText = document.getElementById('formula-text');
        const lRes = document.getElementById('live-result');
        
        fText.innerText = formula.map(x => x === '*' ? '×' : (x === '/' ? '÷' : x)).join(' ') || "Selectează elemente...";
        
        let res = calculateCurrent();
        lRes.innerText = res;
        lRes.style.color = (res === target) ? 'var(--cyan)' : 'var(--gold)';
    }

    function calculateCurrent() {
        if(formula.length === 0) return 0;
        let tempFormula = [...formula];
        
        // Închidem parantezele neterminate pentru calculul live
        let openCount = tempFormula.filter(x => x === '(').length;
        let closeCount = tempFormula.filter(x => x === ')').length;
        for(let i=0; i < (openCount - closeCount); i++) tempFormula.push(')');
        
        // Eliminăm operatorul de la final dacă există
        if(['+','-','*','/','('].includes(tempFormula[tempFormula.length-1])) tempFormula.pop();

        try {
            let result = eval(tempFormula.join(''));
            return Number.isInteger(result) ? result : result.toFixed(1);
        } catch(e) {
            return "Err";
        }
    }

    function checkResult() {
        let openCount = formula.filter(x => x === '(').length;
        let closeCount = formula.filter(x => x === ')').length;
        
        if(openCount !== closeCount) return; // Paranteze neînchise

        let current = calculateCurrent();
        if(current === target) {
            score += 20;
            document.getElementById('score').innerText = score;
            
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('crystalHS', highScore);
                document.getElementById('high-score').innerText = highScore;
            }

            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                initGame();
            }, 1500);
        }
    }

    function resetCurrent() {
        formula = [];
        renderNumbers();
        updateUI();
    }

    initGame();
</script>

</body>
</html>
