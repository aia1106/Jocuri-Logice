<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Neon Geometry Sniper - Kids Edition</title>
    <style>
        body { margin: 0; background: #050510; color: #fff; font-family: sans-serif; overflow: hidden; cursor: none; }
        #ui { 
            position: absolute; top: 20px; width: 100%; 
            display: flex; justify-content: space-around; align-items: center;
            font-size: 26px; font-weight: bold; pointer-events: none; z-index: 10;
        }
        #mission-control {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }
        #target-canvas {
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #f0f;
            border-radius: 15px;
            box-shadow: 0 0 20px #f0f;
            margin-top: 10px;
        }
        #aim { 
            position: absolute; width: 40px; height: 40px; 
            border: 2px solid #0f0; border-radius: 50%; 
            pointer-events: none; transform: translate(-50%, -50%); 
            box-shadow: 0 0 10px #0f0; z-index: 100;
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: #0ff;">SCOR: <span id="score">0</span></div>
</div>

<div id="mission-control">
    <div style="color: #f0f; text-shadow: 0 0 10px #f0f;">ȚINTEȘTE ACEASTĂ FORMĂ:</div>
    <canvas id="target-canvas" width="100" height="100"></canvas>
</div>

<div id="aim"></div>
<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const targetCanvas = document.getElementById('target-canvas');
    const tCtx = targetCanvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let targetShapeType = "";
    let shapes = [];
    const shapeTypes = ['CERC', 'PĂTRAT', 'TRIUNGHI', 'HEXAGON'];
    const neonColors = ['#0ff', '#f0f', '#0f0', '#ff0', '#fff', '#f00'];

    function drawShape(context, type, x, y, r, color, rotation) {
        context.save();
        context.translate(x, y);
        context.rotate(rotation);
        context.shadowBlur = 15;
        context.shadowColor = color;
        context.strokeStyle = color;
        context.lineWidth = 4;
        context.beginPath();

        if (type === 'CERC') {
            context.arc(0, 0, r, 0, Math.PI * 2);
        } else if (type === 'PĂTRAT') {
            context.rect(-r, -r, r * 2, r * 2);
        } else if (type === 'TRIUNGHI') {
            context.moveTo(0, -r);
            context.lineTo(r, r);
            context.lineTo(-r, r);
            context.closePath();
        } else if (type === 'HEXAGON') {
            for (let i = 0; i < 6; i++) {
                context.lineTo(r * Math.cos(i * Math.PI / 3), r * Math.sin(i * Math.PI / 3));
            }
            context.closePath();
        }
        context.stroke();
        context.restore();
    }

    class Shape {
        constructor(type, isCorrect) {
            this.type = type;
            this.isCorrect = isCorrect;
            this.r = 45;
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = Math.random() * (canvas.height - 250) + 100;
            this.speed = 3.5;
            this.dir = Math.random() * Math.PI * 2;
            this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
            this.rotation = 0;
            this.rotSpeed = Math.random() * 0.05;
        }

        update() {
            this.x += Math.cos(this.dir) * this.speed;
            this.y += Math.sin(this.dir) * this.speed;
            this.rotation += this.rotSpeed;
            if (this.x < this.r || this.x > canvas.width - this.r) this.dir = Math.PI - this.dir;
            if (this.y < this.r || this.y > canvas.height - this.r) this.dir = -this.dir;
        }
    }

    function startRound() {
        targetShapeType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        
        // Desenăm modelul în chenarul de jos
        tCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);
        drawShape(tCtx, targetShapeType, 50, 50, 30, "#fff", 0);

        shapes = [];
        shapes.push(new Shape(targetShapeType, true));
        for (let i = 0; i < 5; i++) {
            let wrongType;
            do { wrongType = shapeTypes[Math.floor(Math.random() * shapeTypes.length)]; } 
            while (wrongType === targetShapeType);
            shapes.push(new Shape(wrongType, false));
        }
    }

    canvas.onclick = (e) => {
        for (let i = shapes.length - 1; i >= 0; i--) {
            let s = shapes[i];
            let d = Math.hypot(e.clientX - s.x, e.clientY - s.y);
            if (d < s.r + 10) {
                if (s.type === targetShapeType) {
                    score += 20;
                    startRound();
                } else {
                    score = Math.max(0, score - 10);
                    shapes.splice(i, 1);
                }
                document.getElementById('score').innerText = score;
                break;
            }
        }
    };

    window.onmousemove = (e) => {
        document.getElementById('aim').style.left = e.clientX + 'px';
        document.getElementById('aim').style.top = e.clientY + 'px';
    };

    function loop() {
        ctx.fillStyle = "rgba(5, 5, 16, 0.2)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        shapes.forEach(s => { 
            s.update(); 
            drawShape(ctx, s.type, s.x, s.y, s.r, s.color, s.rotation); 
        });
        requestAnimationFrame(loop);
    }

    startRound();
    loop();
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
