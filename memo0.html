<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Cifrelor - Clasa 0</title>
    <style>
        :root {
            --bg-color: #fff9c4; /* Galben pai deschis */
            --card-back: #4caf50; /* Verde iarbă */
            --card-front: #ffffff;
            --dot-color: #e91e63; /* Buline roz/roșii */
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 { color: #2e7d32; font-size: 2.5rem; margin: 10px 0; text-align: center; text-shadow: 2px 2px white; }
        p { font-size: 1.3rem; color: #558b2f; margin-bottom: 15px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            perspective: 1000px;
        }

        .card {
            width: 85px;
            height: 85px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 4px solid white;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Stil pentru bulinele care reprezintă numărul */
        .dots-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 5px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--dot-color);
            border-radius: 50%;
        }

        #win-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.5s;
        }

        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #e65100;
            font-family: inherit;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>🐥 Ferma Cifrelor 🐥</h1>
    <p>Găsește cifra și bulinele ei!</p>

    <div class="grid" id="game-grid"></div>

    <div id="win-screen">
        <h2 style="font-size: 3rem; color: #ff9800;">BRAVO! 🌟</h2>
        <p>Ești un campion!</p>
        <button onclick="initGame()">Joacă din nou! 🚜</button>
    </div>

<script>
    const gridElement = document.getElementById('game-grid');
    const winScreen = document.getElementById('win-screen');
    
    // Cifrele pentru clasa 0
    const numbers = [1, 2, 3, 4, 5, 6]; 

    let flippedCards = [];
    let matchedCount = 0;

    function createDots(n) {
        let dotsHtml = '<div class="dots-container">';
        for(let i=0; i<n; i++) {
            dotsHtml += '<div class="dot"></div>';
        }
        dotsHtml += '</div>';
        return dotsHtml;
    }

    function initGame() {
        gridElement.innerHTML = '';
        winScreen.style.display = 'none';
        matchedCount = 0;
        flippedCards = [];

        // Creăm perechile: un card cu cifră, unul cu buline
        let gameData = [];
        numbers.forEach(n => {
            gameData.push({ content: n, val: n, type: 'num' });
            gameData.push({ content: createDots(n), val: n, type: 'dots' });
        });

        // Amestecăm
        gameData.sort(() => Math.random() - 0.5);

        gameData.forEach(item => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.val = item.val;
            
            card.innerHTML = `
                <div class="card-face card-back">?</div>
                <div class="card-face card-front">${item.content}</div>
            `;
            
            card.onclick = () => flipCard(card);
            gridElement.appendChild(card);
        });
    }

    function flipCard(card) {
        if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.dataset.matched) {
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }
    }

    function checkMatch() {
        const [c1, c2] = flippedCards;
        if (c1.dataset.val === c2.dataset.val) {
            c1.dataset.matched = "true";
            c2.dataset.matched = "true";
            matchedCount += 2;
            flippedCards = [];
            if (matchedCount === numbers.length * 2) {
                setTimeout(() => { winScreen.style.display = 'flex'; }, 800);
            }
        } else {
            setTimeout(() => {
                c1.classList.remove('flipped');
                c2.classList.remove('flipped');
                flippedCards = [];
            }, 1200);
        }
    }

    initGame();
</script>
</body>
</html>
