<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provocarea Înmulțirii - 3 Termeni</title>
    <style>
        :root {
            --primary: #9b59b6;
            --success: #2ecc71;
            --error: #e74c3c;
            --bg: #fdfaff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .fisa {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid var(--primary);
        }

        h1 { text-align: center; color: #8e44ad; margin-bottom: 10px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; }

        .exercitii-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .exercitiu {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1rem;
        }

        .operatie { margin-right: 10px; font-weight: 600; }

        input {
            width: 55px;
            height: 40px;
            text-align: center;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input.corect {
            border-color: var(--success);
            background-color: #ecfdf5;
            color: var(--success);
            pointer-events: none;
        }

        input.gresit {
            border-color: var(--error);
            background-color: #fff5f5;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9b59b6, #2ecc71);
            transition: width 0.4s;
        }

        .congrats {
            display: none;
            text-align: center;
            color: var(--success);
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.3rem;
        }

        @media (max-width: 600px) {
            .exercitii-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="fisa">
    <h1>✖️ Matematica Isteților ➗</h1>
    <p style="text-align: center; color: #666;">Rezolvă operațiile cu 3 termeni!</p>

    <div class="progress-bar">
        <div id="progress-fill"></div>
    </div>

    <div class="exercitii-container">
        <div class="exercitiu">
            <span class="operatie">2 × 3 × 4 =</span>
            <input type="number" data-answer="24">
        </div>
        <div class="exercitiu">
            <span class="operatie">18 ÷ 3 ÷ 2 =</span>
            <input type="number" data-answer="3">
        </div>
        <div class="exercitiu">
            <span class="operatie">5 × 1 × 9 =</span>
            <input type="number" data-answer="45">
        </div>
        <div class="exercitiu">
            <span class="operatie">24 ÷ 4 × 2 =</span>
            <input type="number" data-answer="12">
        </div>
        <div class="exercitiu">
            <span class="operatie">3 × 3 × 3 =</span>
            <input type="number" data-answer="27">
        </div>
        <div class="exercitiu">
            <span class="operatie">16 ÷ 2 ÷ 4 =</span>
            <input type="number" data-answer="2">
        </div>
        <div class="exercitiu">
            <span class="operatie">4 × 2 × 2 =</span>
            <input type="number" data-answer="16">
        </div>
        <div class="exercitiu">
            <span class="operatie">30 ÷ 5 ÷ 3 =</span>
            <input type="number" data-answer="2">
        </div>

        <div class="exercitiu" style="grid-column: span 2; background: #f0f7ff; justify-content: center;">
            <span class="operatie">2 × x × 4 = 16 | x =</span>
            <input type="number" data-answer="2">
        </div>
        <div class="exercitiu" style="grid-column: span 2; background: #f0f7ff; justify-content: center;">
            <span class="operatie">12 ÷ a ÷ 2 = 2 | a =</span>
            <input type="number" data-answer="3">
        </div>
    </div>

    <div id="congrats-msg" class="congrats">
        🎉 Felicitări! Ai rezolvat totul corect! 🏆
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input');
    const progressFill = document.getElementById('progress-fill');
    const congratsMsg = document.getElementById('congrats-msg');

    function checkCompletion() {
        const correctCount = document.querySelectorAll('input.corect').length;
        const total = inputs.length;
        const percentage = (correctCount / total) * 100;
        progressFill.style.width = percentage + '%';

        if (correctCount === total) {
            congratsMsg.style.display = 'block';
        }
    }

    inputs.forEach(input => {
        input.addEventListener('input', function() {
            const val = this.value;
            const target = this.getAttribute('data-answer');

            if (val === target) {
                this.classList.add('corect');
                this.classList.remove('gresit');
                checkCompletion();
            } else if (val.length >= target.length) {
                this.classList.add('gresit');
                setTimeout(() => {
                    if (!this.classList.contains('corect')) {
                        this.value = '';
                        this.classList.remove('gresit');
                    }
                }, 2000);
            }
        });
    });
</script>

</body>
</html>
